name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Do a dry run to preview instead of a real release'
        required: true
        default: 'true'

jobs:
  authorize:
     name: Authorize
     runs-on: ubuntu-latest
     steps:
       - name: ${{ github.actor }} permission check to do a release
         uses: "lannonbr/repo-permission-check-action@2bb8c89ba8bf115c4bfab344d6a6f442b24c9a1f" # 2.0.2
         with:
           permission: "write"
         env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [authorize]

    steps:
    - name: Checkout
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

    - name: Set up Ruby 2.7
      uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1
      with:
        ruby-version: 2.7

    - name: Set up Node.js 22
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Semantic Release --dry-run
      if: ${{ github.event.inputs.dryRun == 'true'}}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GIT_AUTHOR_NAME: amplitude-sdk-bot
        GIT_AUTHOR_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        GIT_COMMITTER_NAME: amplitude-sdk-bot
        GIT_COMMITTER_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        GEM_HOST_API_KEY: ${{secrets.GEM_HOST_API_KEY}}
      run: |
        npm ci
        npm exec semantic-release -- --dry-run

    - name: Semantic Release
      if: ${{ github.event.inputs.dryRun == 'false'}}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GIT_AUTHOR_NAME: amplitude-sdk-bot
        GIT_AUTHOR_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        GIT_COMMITTER_NAME: amplitude-sdk-bot
        GIT_COMMITTER_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        GEM_HOST_API_KEY: ${{secrets.GEM_HOST_API_KEY}}
      run: |
        npm ci
        npm exec semantic-release
